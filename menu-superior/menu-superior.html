<div class="topbar-heading">

</div>

<div class="topbar-meta" aria-label="Estado de la aplicación">
  <span id="runtime-status" class="status-pill ready">Electron listo</span>

</div>

<div class="topbar-actions" aria-label="Acciones rápidas">

</div>
